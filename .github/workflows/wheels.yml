name: Build and Publish Wheels

# Triggers:
#   - push of a "v*" tag  → build wheels + publish to PyPI
#   - workflow_dispatch    → build wheels only (no publish), useful for testing
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Build binary wheels for every supported platform / arch
  # -------------------------------------------------------------------------
  build_wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu  → Linux  x86_64 + aarch64 (manylinux & musllinux)
        # windows → Windows AMD64
        # macos   → macOS  x86_64 + arm64  (macos-latest = Apple Silicon runner)
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # QEMU lets the Linux runner emulate aarch64 inside the manylinux/musllinux
      # Docker containers that cibuildwheel uses.
      - name: Set up QEMU (Linux cross-arch)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # cibuildwheel reads its configuration from [tool.cibuildwheel] in
      # pyproject.toml (archs, test-command, etc.)
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # -------------------------------------------------------------------------
  # Build the source distribution (sdist)
  # -------------------------------------------------------------------------
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        # `python -m build` installs build-system.requires (Cython etc.) in
        # an isolated environment automatically before building.
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  # -------------------------------------------------------------------------
  # Publish everything to PyPI (tag pushes only)
  #
  # SETUP REQUIRED (one-time):
  #   1. Go to https://pypi.org/manage/project/pysettrie/settings/publishing/
  #   2. Add a "Trusted Publisher":
  #        Owner:      GregoryMorse
  #        Repository: pysettrie
  #        Workflow:   wheels.yml
  #        Environment: pypi
  #   This lets the action authenticate via OIDC — no API token needed.
  # -------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/project/pysettrie/

    permissions:
      id-token: write   # Required for OIDC Trusted Publisher authentication

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
